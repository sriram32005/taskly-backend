version: "3.9"

services:
  app:
    build: .
    container_name: taskly_app
    ports:
      - "8085:8085"
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: taskly
      DB_PORT: 5432
    restart: always

  db:
    image: postgres:15
    container_name: taskly_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: taskly
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: